<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #1a1a2e;
  --red: #e03535;
  --mono: 'DM Mono', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  overflow: hidden;
  user-select: none;
}

.screen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
}

/* ── Estado "esperando" ── */
#stateIdle {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; text-align: center;
}
.idle-icon { font-size: 3rem; opacity: 0.2; }
.idle-text {
  font-size: 0.75rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: rgba(255,255,255,0.25); line-height: 1.8;
}

/* ── Reproductor activo ── */
#stateActive {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; height: 100%; gap: 0;
}

.label {
  font-size: clamp(0.55rem, 1.5vw, 0.75rem);
  letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,255,255,0.25); margin-bottom: clamp(6px, 2vh, 16px);
}

.timer-name {
  font-size: clamp(1rem, 3.5vw, 1.8rem);
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.04em;
  margin-bottom: clamp(4px, 1.5vh, 12px);
  max-width: 80vw; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; text-align: center;
}

#bigTime {
  font-size: clamp(5rem, 22vw, 18rem);
  font-weight: 300;
  letter-spacing: 0.02em;
  line-height: 1;
  color: #fff;
  text-align: center;
  transition: color 0.15s;
}

/* Parpadeo SOLO en los números */
#bigTime.danger { animation: numBlink 1s step-start infinite; }
@keyframes numBlink {
  0%, 100% { color: var(--red); }
  50%       { color: rgba(255,255,255,0.1); }
}

#bigTime.paused { color: rgba(255,255,255,0.35); }

.sub-label {
  font-size: clamp(0.55rem, 1.5vw, 0.72rem);
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  margin-top: clamp(8px, 2vh, 20px);
}

/* Barra de progreso */
.prog-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.08);
}
.prog-fill {
  height: 100%; width: 0%;
  background: rgba(255,255,255,0.35);
  transition: width 0.15s linear, background 0.3s;
}
.prog-fill.danger { background: var(--red); }
</style>
</head>
<body>
<div class="screen">

  <!-- Esperando -->
  <div id="stateIdle">
    <div class="idle-icon">⏱</div>
    <div class="idle-text">
      Esperando...<br>
      Presiona <strong>Reproducir</strong><br>en la ventana de configuración
    </div>
  </div>

  <!-- Activo -->
  <div id="stateActive">
    <div class="label"      id="modeLabel">temporizador</div>
    <div class="timer-name" id="timerName"></div>
    <div id="bigTime">00:00</div>
    <div class="sub-label"  id="subLabel">en curso</div>
  </div>

  <!-- Barra de progreso (siempre al fondo) -->
  <div class="prog-wrap">
    <div class="prog-fill" id="progFill"></div>
  </div>

</div>

<script>
// ─── Canal de comunicación ────────────────────────────────────────────
const CH      = 'timer_channel_v1';
const CH_BACK = 'timer_channel_v1_back';

const DANGER_MS = 1 * 60 * 1000;

// ─── Estado ──────────────────────────────────────────────────────────
let playerMode = 'idle';   // 'idle' | 'timer' | 'stopwatch'
let totalMs    = 0;
let remaining  = 0;
let elapsed    = 0;
let running    = false;
let lastTick   = 0;
let rafId      = null;
let timerName  = '';

// ─── Utils ───────────────────────────────────────────────────────────
const pad = n => String(Math.floor(Math.abs(n))).padStart(2, '0');

function fmtMs(ms) {
  const t = Math.floor(ms / 1000), s = t % 60, m = Math.floor(t/60)%60, h = Math.floor(t/3600);
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}



function sendBack(status) {
  localStorage.setItem(CH_BACK, JSON.stringify({ status, _t: Date.now() }));
}

// ─── Display ─────────────────────────────────────────────────────────
function updateDisplay() {
  const ms  = playerMode === 'timer' ? remaining : elapsed;
  const str = fmtMs(ms);

  let danger = false;
  if (playerMode === 'timer')     danger = remaining <= DANGER_MS && remaining > 0;
  if (playerMode === 'stopwatch') danger = elapsed >= DANGER_MS;

  const el = document.getElementById('bigTime');
  el.textContent = str;
  el.classList.toggle('danger', danger && running);
  el.classList.toggle('paused', !running && playerMode !== 'idle');

  document.getElementById('progFill').classList.toggle('danger', danger);

  let ratio = 0;
  if (playerMode === 'timer')     ratio = totalMs > 0 ? 1 - remaining/totalMs : 0;
  if (playerMode === 'stopwatch') ratio = (elapsed % 60000) / 60000;
  document.getElementById('progFill').style.width = Math.min(100, ratio*100) + '%';
}

function setSubLabel(txt) { document.getElementById('subLabel').textContent = txt; }

// ─── Tick ─────────────────────────────────────────────────────────────
function tick() {
  if (!running) return;
  const now = Date.now(), delta = now - lastTick;
  lastTick = now;

  if (playerMode === 'timer') {
    remaining = Math.max(0, remaining - delta);
    updateDisplay();
    if (remaining <= 0) {
      // Cambiar a cronómetro automaticamente
      playerMode = 'stopwatch';
      elapsed    = 0;
      document.getElementById('modeLabel').textContent = 'tiempo extra';
      setSubLabel('tiempo extra');
    }
  } else {
    elapsed += delta;
    updateDisplay();
  }

  rafId = requestAnimationFrame(tick);
}

// ─── Acciones ─────────────────────────────────────────────────────────
function doPlay(mode, ms, name) {
  cancelAnimationFrame(rafId);
  playerMode = mode;
  totalMs    = ms;
  remaining  = ms;
  elapsed    = 0;
  timerName  = name || '';
  running    = true;
  lastTick   = Date.now();

  document.getElementById('stateIdle').style.display  = 'none';
  document.getElementById('stateActive').style.display = 'flex';
  document.getElementById('modeLabel').textContent  = mode === 'timer' ? 'temporizador' : 'cronómetro';
  document.getElementById('timerName').textContent  = timerName;
  setSubLabel('en curso');

  updateDisplay();
  sendBack('playing');
  rafId = requestAnimationFrame(tick);
}

function doPause() {
  if (playerMode === 'idle') return;
  cancelAnimationFrame(rafId);
  running = false;
  setSubLabel('pausado');
  updateDisplay();
  sendBack('paused');
}

function doResume() {
  if (playerMode === 'idle' || running) return;
  if (playerMode === 'timer' && remaining <= 0) return;
  running  = true;
  lastTick = Date.now();
  setSubLabel('en curso');
  updateDisplay();
  sendBack('playing');
  rafId = requestAnimationFrame(tick);
}

function doReset() {
  cancelAnimationFrame(rafId);
  running   = false;
  elapsed   = 0;
  remaining = totalMs;
  setSubLabel('listo');
  updateDisplay();
  sendBack('paused');
}

function doStop() {
  cancelAnimationFrame(rafId);
  running    = false;
  playerMode = 'idle';
  elapsed    = 0; remaining = 0;

  document.getElementById('stateActive').style.display = 'none';
  document.getElementById('stateIdle').style.display   = 'flex';
  document.getElementById('bigTime').className         = '';
  document.getElementById('progFill').style.width      = '0%';
  document.getElementById('progFill').classList.remove('danger');
  sendBack('idle');
}

// ─── Escuchar mensajes de la ventana de configuración ─────────────────
window.addEventListener('storage', e => {
  if (e.key !== CH) return;
  try {
    const msg = JSON.parse(e.newValue);
    switch (msg.cmd) {
      case 'play':   doPlay(msg.mode, msg.totalMs, msg.name); break;
      case 'pause':  running ? doPause() : doResume();        break;
      case 'reset':  doReset();                               break;
      case 'stop':   doStop();                                break;
    }
  } catch(err) {}
});

// ─── Espacio para pausar/reanudar desde esta ventana ──────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); running ? doPause() : doResume(); }
});
</script>
</body>
</html>
