<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #1a1a2e;
  --yellow: #f5c542;
  --red:    #e03535;
  --mono:   'DM Mono', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: #fff;
  font-family: var(--mono);
  overflow: hidden;
  user-select: none;
}

.screen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}

/* ── Idle ── */
#stateIdle {
  display: flex; flex-direction: column;
  align-items: center; gap: 16px; text-align: center;
}
.idle-icon { font-size: 3rem; opacity: 0.15; }
.idle-text {
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.2); line-height: 2;
}

/* ── Activo ── */
#stateActive {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; gap: 0;
}

.mode-label {
  font-size: clamp(0.6rem, 1.6vw, 0.8rem);
  letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  margin-bottom: clamp(4px, 1.5vh, 12px);
}

.timer-name {
  font-size: clamp(1rem, 3.5vw, 1.9rem);
  font-weight: 400;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.05em;
  margin-bottom: clamp(2px, 1vh, 10px);
  max-width: 80vw; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; text-align: center;
}

/* Tiempo principal */
#bigTime {
  font-size: clamp(5rem, 22vw, 18rem);
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1;
  color: #fff;
  text-align: center;
}

/* Amarillo: último minuto del temporizador */
#bigTime.warning {
  animation: blinkYellow 1s step-start infinite;
}
@keyframes blinkYellow {
  0%, 100% { color: var(--yellow); }
  50%       { color: rgba(255,255,255,0.1); }
}

/* Rojo: SOLO tiempo extra (post temporizador) */
#bigTime.overtime {
  animation: blinkRed 1s step-start infinite;
}
@keyframes blinkRed {
  0%, 100% { color: var(--red); }
  50%       { color: rgba(255,255,255,0.1); }
}

/* Cronómetro libre: siempre blanco, sin parpadeo */
#bigTime.stopwatch-free {
  color: #fff;
  animation: none;
}

/* Pausado */
#bigTime.paused {
  color: rgba(255,255,255,0.28);
  animation: none;
}

.sub-label {
  font-size: clamp(0.75rem, 2.2vw, 1.1rem);
  font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  margin-top: clamp(10px, 2.5vh, 24px);
}
.sub-label.overtime { color: rgba(229,53,53,0.7); }
.sub-label.warning  { color: rgba(245,197,66,0.7); }

/* Barra de progreso */
.prog-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: rgba(255,255,255,0.07);
}
.prog-fill {
  height: 100%; width: 0%;
  background: rgba(255,255,255,0.3);
  transition: width 0.15s linear, background 0.4s;
}
.prog-fill.warning  { background: var(--yellow); }
.prog-fill.overtime { background: var(--red); }
</style>
</head>
<body>
<div class="screen">

  <div id="stateIdle">
    <div class="idle-icon">⏱</div>
    <div class="idle-text">
      Esperando...<br>
      Presiona <strong>Reproducir</strong><br>en la ventana de configuración
    </div>
  </div>

  <div id="stateActive">
    <div class="mode-label" id="modeLabel">temporizador</div>
    <div class="timer-name" id="timerName"></div>
    <div id="bigTime">00:00</div>
    <div class="sub-label"  id="subLabel">en curso</div>
  </div>

  <div class="prog-wrap">
    <div class="prog-fill" id="progFill"></div>
  </div>

</div>
<script>
// ─── Canales ──────────────────────────────────────────────────────
const CH       = 'timer_channel_v1';
const CH_BACK  = 'timer_channel_v1_back';
const CH_STATE = 'timer_mirror_state';

const WARN_MS = 60 * 1000;  // 1 minuto → amarillo

// ─── Estado ───────────────────────────────────────────────────────
// playerMode: 'idle' | 'timer' | 'overtime' | 'stopwatch'
//   - 'timer'     : temporizador en cuenta regresiva
//   - 'overtime'  : cronómetro post-temporizador (parpadea rojo)
//   - 'stopwatch' : cronómetro libre (blanco, sin parpadeo)
let playerMode = 'idle';
let totalMs = 0, remaining = 0, elapsed = 0;
let running = false, lastTick = 0, rafId = null;

// ─── Utils ────────────────────────────────────────────────────────
const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0');
function fmtMs(ms) {
  const t=Math.floor(ms/1000), s=t%60, m=Math.floor(t/60)%60, h=Math.floor(t/3600);
  return h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

// ─── Publicar estado para el espejo ───────────────────────────────
function publishState() {
  localStorage.setItem(CH_STATE, JSON.stringify({
    playerMode, totalMs, remaining, elapsed,
    running, ts: Date.now()
  }));
}

function sendBack(status) {
  localStorage.setItem(CH_BACK, JSON.stringify({ status, _t: Date.now() }));
}

function setSubLabel(txt, cls='') {
  const el = document.getElementById('subLabel');
  el.textContent = txt;
  el.className = 'sub-label' + (cls ? ' ' + cls : '');
}

// ─── Display ──────────────────────────────────────────────────────
function updateDisplay() {
  const ms = (playerMode==='timer') ? remaining : elapsed;
  const el = document.getElementById('bigTime');
  const pf = document.getElementById('progFill');

  el.textContent = fmtMs(ms);

  // Limpiar todas las clases de estado
  el.className = '';

  if (!running && playerMode !== 'idle') {
    el.classList.add('paused');
  } else if (playerMode === 'timer' && remaining <= WARN_MS && remaining > 0) {
    el.classList.add('warning');
  } else if (playerMode === 'overtime') {
    el.classList.add('overtime');
  } else if (playerMode === 'stopwatch') {
    el.classList.add('stopwatch-free');  // blanco, sin animación
  }

  // Barra de progreso
  pf.className = 'prog-fill';
  if (playerMode === 'timer' && remaining <= WARN_MS && remaining > 0) {
    pf.classList.add('warning');
  } else if (playerMode === 'overtime') {
    pf.classList.add('overtime');
  }

  let ratio = 0;
  if (playerMode === 'timer')                      ratio = totalMs > 0 ? 1 - remaining/totalMs : 0;
  if (playerMode === 'overtime' || playerMode === 'stopwatch') ratio = (elapsed % 60000) / 60000;
  pf.style.width = Math.min(100, ratio * 100) + '%';

  // Publicar para el espejo en configuración
  publishState();
}

// ─── Tick ─────────────────────────────────────────────────────────
function tick() {
  if (!running) return;
  const now = Date.now(), delta = now - lastTick;
  lastTick = now;

  if (playerMode === 'timer') {
    remaining = Math.max(0, remaining - delta);
    updateDisplay();
    if (remaining <= 0) {
      // Pasar a modo tiempo extra (parpadea rojo)
      playerMode = 'overtime';
      elapsed    = 0;
      document.getElementById('modeLabel').textContent = 'tiempo extra';
      setSubLabel('tiempo extra', 'overtime');
      updateDisplay();
    }
  } else {
    // overtime o stopwatch: contar hacia arriba
    elapsed += delta;
    updateDisplay();
  }

  rafId = requestAnimationFrame(tick);
}

// ─── Acciones ─────────────────────────────────────────────────────
function doPlay(mode, ms, name) {
  cancelAnimationFrame(rafId);
  // mode viene como 'timer' o 'stopwatch' desde configuración
  playerMode = mode;
  totalMs    = ms;
  remaining  = ms;
  elapsed    = 0;
  running    = true;
  lastTick   = Date.now();

  document.getElementById('stateIdle').style.display   = 'none';
  document.getElementById('stateActive').style.display = 'flex';
  document.getElementById('modeLabel').textContent = mode === 'timer' ? 'temporizador' : 'cronómetro';
  document.getElementById('timerName').textContent = name || '';
  setSubLabel('en curso');

  updateDisplay();
  sendBack('playing');
  rafId = requestAnimationFrame(tick);
}

function doPause() {
  if (playerMode === 'idle') return;
  cancelAnimationFrame(rafId);
  running = false;
  setSubLabel('pausado');
  updateDisplay();
  sendBack('paused');
}

function doResume() {
  if (playerMode === 'idle' || running) return;
  if (playerMode === 'timer' && remaining <= 0) return;
  running  = true;
  lastTick = Date.now();

  if (playerMode === 'overtime') {
    setSubLabel('tiempo extra', 'overtime');
  } else {
    setSubLabel('en curso');
  }

  updateDisplay();
  sendBack('playing');
  rafId = requestAnimationFrame(tick);
}

function doReset() {
  cancelAnimationFrame(rafId);
  running    = false;
  playerMode = 'timer';
  elapsed    = 0;
  remaining  = totalMs;
  document.getElementById('modeLabel').textContent = 'temporizador';
  setSubLabel('listo');
  updateDisplay();
  sendBack('paused');
}

function doStop() {
  cancelAnimationFrame(rafId);
  running    = false;
  playerMode = 'idle';
  elapsed    = 0;
  remaining  = 0;

  document.getElementById('stateActive').style.display = 'none';
  document.getElementById('stateIdle').style.display   = 'flex';

  const el = document.getElementById('bigTime');
  el.className = ''; el.textContent = '00:00';

  const pf = document.getElementById('progFill');
  pf.style.width = '0%'; pf.className = 'prog-fill';

  sendBack('idle');
  localStorage.removeItem(CH_STATE);
}

// ─── Escuchar comandos de configuración ───────────────────────────
window.addEventListener('storage', e => {
  if (e.key !== CH) return;
  try {
    const msg = JSON.parse(e.newValue);
    switch (msg.cmd) {
      case 'play':  doPlay(msg.mode, msg.totalMs, msg.name); break;
      case 'pause': running ? doPause() : doResume();        break;
      case 'reset': doReset();                               break;
      case 'stop':  doStop();                                break;
    }
  } catch(e) {}
});

// Espacio para pausar/reanudar desde esta ventana
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); running ? doPause() : doResume(); }
});
</script>
</body>
</html>
