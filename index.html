<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer — Configuración</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f5f2ec;
  --surface: #ffffff;
  --card:    #f0ece4;
  --border:  #ddd8ce;
  --accent:  #1a1a2e;
  --red:     #e03535;
  --green:   #1d7a4e;
  --yellow:  #d4940c;
  --muted:   #9a9282;
  --text:    #1a1814;
  --mono:    'DM Mono', monospace;
  --serif:   'Instrument Serif', serif;
  --sans:    'Outfit', sans-serif;
  --sidebar: 260px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
}

/* ══ SIDEBAR ══ */
#sidebar {
  width: var(--sidebar); min-height: 100vh;
  background: var(--accent); color: #fff;
  display: flex; flex-direction: column; flex-shrink: 0;
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 200;
  transform: translateX(calc(-1 * var(--sidebar)));
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
#sidebar.open { transform: translateX(0); }

.sb-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.sb-title { font-family: var(--serif); font-style: italic; font-size: 1.3rem; color: rgba(255,255,255,0.85); }
.sb-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.5);
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.sb-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

.sb-new-group {
  margin: 14px 16px 6px; width: calc(100% - 32px);
  font-family: var(--sans); font-weight: 600; font-size: 0.75rem;
  letter-spacing: 0.04em; padding: 9px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);
  border: 1px dashed rgba(255,255,255,0.2); cursor: pointer; transition: all 0.15s;
}
.sb-new-group:hover { background: rgba(255,255,255,0.12); color: #fff; }

.sb-groups { padding: 4px 0 20px; }
.sb-group  { margin: 2px 0; }

.sb-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; cursor: pointer; transition: background 0.15s; user-select: none;
}
.sb-group-header:hover { background: rgba(255,255,255,0.06); }
.sb-group-header.active-group { background: rgba(255,255,255,0.1); }
.sb-group-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sb-group-name { flex: 1; font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-group-header.active-group .sb-group-name { color: #fff; }
.sb-chevron { font-size: 0.6rem; color: rgba(255,255,255,0.3); transition: transform 0.2s; flex-shrink: 0; }
.sb-group-header.open .sb-chevron { transform: rotate(90deg); }

.sb-group-items { display: none; padding: 2px 0 4px 32px; }
.sb-group-items.open { display: block; }

.sb-item {
  font-size: 0.8rem; color: rgba(255,255,255,0.5);
  padding: 6px 16px 6px 0; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.15s; border-radius: 4px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.sb-item:hover { color: rgba(255,255,255,0.9); }
.sb-item.selected { color: #fff; font-weight: 600; }
.sb-item-time { font-family: var(--mono); font-size: 0.7rem; color: rgba(255,255,255,0.3); flex-shrink: 0; }
.sb-item.selected .sb-item-time { color: rgba(255,255,255,0.55); }

#backdrop { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,0.35); }
#backdrop.visible { display: block; }

/* ══ MAIN ══ */
#main { flex: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
.wrap { width: 100%; max-width: 480px; position: relative; z-index: 1; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.btn-menu {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px; transition: all 0.15s; flex-shrink: 0;
}
.btn-menu:hover { border-color: var(--accent); }
.btn-menu span { display: block; width: 14px; height: 1.5px; background: var(--accent); border-radius: 2px; }
header h1 { font-family: var(--serif); font-size: 2.2rem; font-style: italic; letter-spacing: -0.02em; line-height: 1; }
header p  { font-size: 0.75rem; color: var(--muted); }

.btn-window {
  flex-shrink: 0; font-family: var(--sans); font-weight: 600; font-size: 0.78rem;
  padding: 10px 16px; border-radius: 10px;
  background: var(--accent); color: #fff; border: none;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.btn-window:hover { background: #2d2d4e; }
.btn-window:active { transform: scale(0.96); }

.window-status {
  display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 18px;
}
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
.ws-dot.on      { background: var(--green); animation: pulse 1.4s ease-in-out infinite; }
.ws-dot.playing { background: var(--green); animation: pulse 0.9s ease-in-out infinite; }
.ws-dot.danger  { background: var(--red);   animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.type-toggle {
  display: flex; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 4px; margin-bottom: 18px; gap: 4px;
}
.ttab {
  flex: 1; font-family: var(--sans); font-weight: 600; font-size: 0.78rem;
  padding: 10px 8px; border: none; background: transparent;
  border-radius: 9px; color: var(--muted); cursor: pointer; transition: all 0.18s; text-align: center;
}
.ttab.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

/* ── Panel control + espejo ── */
.control-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px; margin-bottom: 18px;
  box-shadow: 0 2px 0 var(--border);
}
.control-panel h3 { font-family: var(--serif); font-size: 0.95rem; font-style: italic; color: var(--muted); margin-bottom: 14px; }

.preview-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }

/* Tiempo estático (del timer seleccionado) */
.preview-time {
  font-family: var(--mono); font-size: 2rem; font-weight: 400;
  letter-spacing: 0.04em; color: var(--text); flex-shrink: 0;
  transition: color 0.3s;
}

/* ── ESPEJO: tiempo en vivo ── */
.mirror-wrap {
  display: none; /* se muestra solo cuando hay reproducción activa */
  align-items: baseline; gap: 8px; margin-bottom: 10px;
}
.mirror-wrap.visible { display: flex; }
.mirror-time {
  font-family: var(--mono); font-size: 2.8rem; font-weight: 700;
  letter-spacing: 0.02em; color: var(--accent);
  transition: color 0.3s; line-height: 1;
}
.mirror-time.warning  { color: var(--yellow); animation: mBlink 1s step-start infinite; }
.mirror-time.overtime { color: var(--red);    animation: mBlink 1s step-start infinite; }
@keyframes mBlink { 0%,100%{opacity:1} 50%{opacity:0.25} }
.mirror-badge {
  font-family: var(--mono); font-size: 0.62rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 7px; color: var(--muted);
  white-space: nowrap;
}
.mirror-badge.live { border-color: var(--green); color: var(--green); }
.mirror-badge.warning  { border-color: var(--yellow); color: var(--yellow); }
.mirror-badge.overtime { border-color: var(--red);    color: var(--red); }

.preview-info { flex: 1; min-width: 0; }
.preview-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preview-sub  { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

.playback-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

.btn {
  font-family: var(--sans); font-weight: 600; font-size: 0.8rem;
  padding: 9px 18px; border-radius: 9px; border: 1.5px solid transparent;
  cursor: pointer; transition: all 0.15s; outline: none;
}
.btn:active { transform: scale(0.96); }
.btn-solid   { background: var(--accent); color: #fff; }
.btn-solid:hover { background: #2d2d4e; }
.btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost   { background: transparent; color: var(--muted); padding: 9px 12px; }
.btn-ghost:hover { color: var(--red); }

/* ── Grupo activo ── */
.group-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.group-bar-name { font-family: var(--serif); font-size: 1.25rem; font-style: italic; display: flex; align-items: center; gap: 8px; }
.group-bar-dot  { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.group-bar-actions { display: flex; gap: 6px; }
.badge { font-family: var(--mono); font-size: 0.68rem; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--muted); }

/* ── Crear temporizador ── */
.create-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px; margin-bottom: 16px;
  box-shadow: 0 2px 0 var(--border);
}
.create-card h3 { font-family: var(--serif); font-size: 0.95rem; font-style: italic; color: var(--muted); margin-bottom: 12px; }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 70px; }
.field label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.field input {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: var(--mono); font-size: 1rem;
  padding: 9px 8px; outline: none; transition: border-color 0.2s; width: 100%; text-align: center;
}
.field input[type="text"] { font-family: var(--sans); text-align: left; }
.field input:focus { border-color: var(--accent); background: #fff; }
.field input::placeholder { color: var(--muted); opacity: 0.6; }
/* Quitar flechas nativas */
.field input[type=number]::-webkit-inner-spin-button,
.field input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.field input[type=number] { -moz-appearance: textfield; }

.btn-add { width: 100%; font-family: var(--sans); font-weight: 600; font-size: 0.82rem; padding: 10px; border-radius: 10px; background: transparent; color: var(--green); border: 1.5px solid #b5d9c8; cursor: pointer; transition: all 0.15s; }
.btn-add:hover { background: rgba(29,122,78,0.06); }

/* ── Lista drag & drop ── */
.saved-list { display: flex; flex-direction: column; gap: 7px; }
.empty { text-align: center; padding: 26px 16px; border: 1.5px dashed var(--border); border-radius: 14px; color: var(--muted); font-size: 0.82rem; line-height: 1.7; }
.empty strong { display: block; font-size: 1.5rem; margin-bottom: 8px; opacity: 0.25; }

.t-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 11px 14px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 0 var(--border);
  transition: border-color 0.2s, box-shadow 0.18s, opacity 0.18s;
  cursor: pointer;
}
.t-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(26,26,46,0.08); }
.t-card.selected { border-color: var(--accent); background: rgba(26,26,46,0.025); }

/* Drag states */
.t-card.dragging   { opacity: 0.4; cursor: grabbing; box-shadow: none; }
.t-card.drag-over  { border-color: var(--accent); border-style: dashed; background: rgba(26,26,46,0.04); }

/* Handle de arrastre */
.drag-handle {
  cursor: grab; color: var(--muted); font-size: 0.85rem;
  padding: 2px 4px; flex-shrink: 0; touch-action: none;
  user-select: none; line-height: 1;
}
.drag-handle:active { cursor: grabbing; }

/* Modo edición */
.t-card.editing { border-color: var(--accent); background: #fff; flex-wrap: wrap; cursor: default; }
.t-edit-row { display: flex; gap: 6px; flex: 1; align-items: center; flex-wrap: wrap; }
.t-edit-input {
  font-family: var(--sans); font-size: 0.85rem; font-weight: 600;
  border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px;
  outline: none; background: var(--card); color: var(--text); flex: 1; min-width: 90px;
}
.t-edit-input:focus { border-color: var(--accent); background: #fff; }
.t-edit-num {
  font-family: var(--mono); font-size: 0.85rem;
  border: 1px solid var(--border); border-radius: 7px; padding: 5px 6px;
  outline: none; background: var(--card); color: var(--text); width: 46px; text-align: center;
}
.t-edit-num:focus { border-color: var(--accent); background: #fff; }
.t-edit-num::-webkit-inner-spin-button, .t-edit-num::-webkit-outer-spin-button { -webkit-appearance: none; }
.t-edit-num { -moz-appearance: textfield; }
.t-edit-sep { color: var(--muted); font-family: var(--mono); font-size: 0.9rem; }
.t-edit-actions { display: flex; gap: 5px; flex-shrink: 0; }

.t-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.t-info { flex: 1; min-width: 0; }
.t-name { font-weight: 600; font-size: 0.86rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-dur  { font-family: var(--mono); font-size: 0.67rem; color: var(--muted); margin-top: 2px; }
.t-time { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--text); flex-shrink: 0; }
.t-actions { display: flex; gap: 4px; }
.icon-btn { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--accent); color: var(--text); }
.icon-btn.del:hover  { border-color: var(--red);   color: var(--red);   background: rgba(224,53,53,0.06); }
.icon-btn.save:hover { border-color: var(--green);  color: var(--green); }

/* ── Modal grupo ── */
.modal-bg { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; }
.modal-bg.visible { display: flex; }
.modal { background: var(--surface); border-radius: 16px; padding: 28px 24px; width: 90%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
.modal h3 { font-family: var(--serif); font-size: 1.2rem; font-style: italic; margin-bottom: 18px; }
.modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.modal-field label { font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.modal-field input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 0.95rem; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
.modal-field input:focus { border-color: var(--accent); background: #fff; }
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: transform 0.15s; flex-shrink: 0; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.picked { border-color: var(--accent); transform: scale(1.15); }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions .btn { flex: 1; }

.no-groups { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem; line-height: 1.8; }
.no-groups strong { display: block; font-size: 2rem; margin-bottom: 10px; opacity: 0.2; }
</style>
</head>
<body>

<div id="backdrop" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="sb-header">
    <span class="sb-title">Grupos</span>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <button class="sb-new-group" onclick="openNewGroupModal()">+ Nuevo grupo</button>
  <div class="sb-groups" id="sbGroups"></div>
</div>

<div id="main">
<div class="wrap">

  <header>
    <div class="header-left">
      <button class="btn-menu" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div>
        <h1>Timers</h1>
        <p>Configuración</p>
      </div>
    </div>
    <button class="btn-window" onclick="openPlayerWindow()">⎋ Abrir reproductor</button>
  </header>

  <div class="window-status">
    <div class="ws-dot" id="wsDot"></div>
    <span id="wsText">Ventana del reproductor no abierta</span>
  </div>

  <div class="type-toggle">
    <button class="ttab active" id="ttTimer"     onclick="switchType('timer')">⏱ Temporizador</button>
    <button class="ttab"        id="ttStopwatch" onclick="switchType('stopwatch')">⏲ Cronómetro</button>
  </div>

  <!-- Panel control -->
  <div class="control-panel">
    <h3>Ahora</h3>

    <!-- ESPEJO: visible cuando hay reproducción activa -->
    <div class="mirror-wrap" id="mirrorWrap">
      <div class="mirror-time" id="mirrorTime">00:00</div>
      <div class="mirror-badge live" id="mirrorBadge">en vivo</div>
    </div>

    <!-- Preview estático (timer seleccionado) -->
    <div class="preview-row">
      <div class="preview-time" id="previewTime">--:--</div>
      <div class="preview-info">
        <div class="preview-name" id="previewName">Sin selección</div>
        <div class="preview-sub"  id="previewSub">Selecciona un temporizador</div>
      </div>
    </div>

    <div class="playback-controls">
      <button class="btn btn-solid"   onclick="sendPlay()">▶ Reproducir</button>
      <button class="btn btn-outline" onclick="sendPause()">⏸ Pausar</button>
      <button class="btn btn-outline" onclick="sendReset()">↺ Reiniciar</button>
      <button class="btn btn-ghost"   onclick="sendStop()">■ Detener</button>
    </div>
  </div>

  <div id="groupContent"></div>

</div>
</div>

<!-- Modal grupo -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Nuevo grupo</h3>
    <div class="modal-field">
      <label>Nombre del grupo</label>
      <input type="text" id="modalGroupName" placeholder="Ej: Reunión semanal…" maxlength="40">
    </div>
    <div class="modal-field">
      <label>Color</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-solid"   onclick="saveGroup()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  CANAL DE COMUNICACIÓN
// ══════════════════════════════════════════════════════════════════
const CH      = 'timer_channel_v1';
const CH_BACK = 'timer_channel_v1_back';
const CH_STATE = 'timer_mirror_state';   // ← estado en vivo del reproductor

// ══════════════════════════════════════════════════════════════════
//  DATOS
// ══════════════════════════════════════════════════════════════════
let data = JSON.parse(localStorage.getItem('timerData_v1') || 'null');
if (!data) {
  const old = JSON.parse(localStorage.getItem('timers_v5') || '[]');
  data = { groups: old.length ? [{ id: Date.now(), name: 'General', color: '#4a6fa5', timers: old }] : [] };
  saveData();
}

let activeGroupId    = data.groups[0]?.id || null;
let activeTimerId    = null;
let appType          = 'timer';
let playerWin        = null;
let playerState      = { status: 'idle' };
let editingTimerId   = null;
let modalEditGroupId = null;
let dragSrcId        = null;   // id del timer siendo arrastrado

const GROUP_COLORS = ['#4a6fa5','#c04040','#1d7a4e','#b06020','#7a1a6e','#5a6e1a','#1a6e7a','#6e4a1a'];
let pickedColor = GROUP_COLORS[0];

function saveData() { localStorage.setItem('timerData_v1', JSON.stringify(data)); }

// ══════════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════════
const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0');
function fmtMs(ms) {
  const t=Math.floor(ms/1000), s=t%60, m=Math.floor(t/60)%60, h=Math.floor(t/3600);
  return h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function fmtLabel(ms) {
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if (h>0)   return `${h}h ${m%60>0?m%60+'m':''}`.trim();
  if (m===0) return `${s}s`;
  if (s%60===0) return `${m}m`;
  return `${m}m ${s%60}s`;
}
function getGroup(id) { return data.groups.find(g=>g.id===id); }
function getTimer(gid,tid) { return getGroup(gid)?.timers.find(t=>t.id===tid); }

// ══════════════════════════════════════════════════════════════════
//  ESPEJO — leer el estado en vivo del reproductor
// ══════════════════════════════════════════════════════════════════
const WARN_MS = 60000;
let mirrorRaf = null;

function startMirror() {
  if (mirrorRaf) return;
  tickMirror();
}
function stopMirror() {
  if (mirrorRaf) cancelAnimationFrame(mirrorRaf);
  mirrorRaf = null;
  document.getElementById('mirrorWrap').classList.remove('visible');
}

function tickMirror() {
  const raw = localStorage.getItem(CH_STATE);
  if (!raw) { mirrorRaf = requestAnimationFrame(tickMirror); return; }
  try {
    const st = JSON.parse(raw);
    if (st.playerMode === 'idle') { stopMirror(); return; }

    document.getElementById('mirrorWrap').classList.add('visible');

    // Interpolar tiempo actual compensando latencia
    const age = Date.now() - (st.ts || Date.now());
    let displayMs;
    if (st.playerMode === 'timer') {
      displayMs = Math.max(0, st.running ? st.remaining - age : st.remaining);
    } else {
      // overtime o stopwatch: elapsed sube
      displayMs = st.running ? st.elapsed + age : st.elapsed;
    }

    const el    = document.getElementById('mirrorTime');
    const badge = document.getElementById('mirrorBadge');
    el.textContent = fmtMs(displayMs);

    // Determinar estilo igual que el reproductor
    const isWarn     = st.playerMode === 'timer'    && displayMs <= WARN_MS && displayMs > 0;
    const isOvertime = st.playerMode === 'overtime';
    const isPaused   = !st.running;

    el.className = 'mirror-time';
    if (!isPaused) {
      if (isWarn)     el.classList.add('warning');
      if (isOvertime) el.classList.add('overtime');
    }

    if (isPaused) {
      badge.textContent = 'pausado';
      badge.className   = 'mirror-badge';
    } else if (isWarn) {
      badge.textContent = '⚠ último minuto';
      badge.className   = 'mirror-badge warning';
    } else if (isOvertime) {
      badge.textContent = 'tiempo extra';
      badge.className   = 'mirror-badge overtime';
    } else {
      badge.textContent = 'en vivo';
      badge.className   = 'mirror-badge live';
    }
  } catch(e) {}
  mirrorRaf = requestAnimationFrame(tickMirror);
}

// Escuchar cambios de estado del reproductor
window.addEventListener('storage', e => {
  if (e.key === CH_STATE) {
    try {
      const st = JSON.parse(e.newValue);
      if (st.playerMode !== 'idle') startMirror();
      else stopMirror();
    } catch(e) {}
  }
  if (e.key === CH_BACK) {
    try {
      const m = JSON.parse(e.newValue);
      if (m.status) { playerState.status = m.status; updateWindowStatus(); }
    } catch(e) {}
  }
});

// ══════════════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════════════
function toggleSidebar() {
  const open = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('visible', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('visible');
}

function renderSidebar() {
  const el = document.getElementById('sbGroups');
  if (!data.groups.length) {
    el.innerHTML = '<div style="padding:16px;font-size:0.75rem;color:rgba(255,255,255,0.25);text-align:center">Sin grupos.<br>Crea uno arriba.</div>';
    return;
  }
  el.innerHTML = data.groups.map(g => `
    <div class="sb-group">
      <div class="sb-group-header ${activeGroupId===g.id?'active-group open':''}" onclick="selectGroup(${g.id})">
        <div class="sb-group-dot" style="background:${g.color}"></div>
        <span class="sb-group-name">${g.name}</span>
        <span class="sb-chevron">▶</span>
      </div>
      <div class="sb-group-items ${activeGroupId===g.id?'open':''}">
        ${(g.timers||[]).map(t=>`
          <div class="sb-item ${activeTimerId===t.id&&activeGroupId===g.id?'selected':''}"
               onclick="selectTimer(${g.id},${t.id});closeSidebar()">
            <span style="overflow:hidden;text-overflow:ellipsis">${t.name}</span>
            <span class="sb-item-time">${fmtMs(t.ms)}</span>
          </div>`).join('')}
        ${!g.timers?.length ? '<div style="font-size:0.72rem;color:rgba(255,255,255,0.2);padding:4px 0">Sin timers</div>' : ''}
      </div>
    </div>`).join('');
}

function selectGroup(id) {
  activeGroupId = id; activeTimerId = null;
  updatePreview(); renderSidebar(); renderGroupContent();
}

// ══════════════════════════════════════════════════════════════════
//  MODAL GRUPO
// ══════════════════════════════════════════════════════════════════
function openNewGroupModal(editId=null) {
  modalEditGroupId = editId;
  const g = editId ? getGroup(editId) : null;
  document.getElementById('modalTitle').textContent = editId ? 'Editar grupo' : 'Nuevo grupo';
  document.getElementById('modalGroupName').value   = g ? g.name : '';
  pickedColor = g ? g.color : GROUP_COLORS[0];
  renderColorPicker();
  document.getElementById('modalBg').classList.add('visible');
  setTimeout(()=>document.getElementById('modalGroupName').focus(), 50);
}
function closeModal() { document.getElementById('modalBg').classList.remove('visible'); modalEditGroupId=null; }
function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = GROUP_COLORS.map(c =>
    `<div class="color-swatch ${c===pickedColor?'picked':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c) { pickedColor=c; renderColorPicker(); }
function saveGroup() {
  const name = document.getElementById('modalGroupName').value.trim();
  if (!name) return;
  if (modalEditGroupId) {
    const g = getGroup(modalEditGroupId);
    if (g) { g.name=name; g.color=pickedColor; }
  } else {
    const g = { id: Date.now(), name, color: pickedColor, timers: [] };
    data.groups.push(g);
    activeGroupId = g.id; activeTimerId = null;
  }
  saveData(); closeModal(); renderSidebar(); renderGroupContent(); updatePreview();
}
function deleteGroup(id) {
  if (!confirm('¿Eliminar este grupo y todos sus temporizadores?')) return;
  data.groups = data.groups.filter(g=>g.id!==id);
  if (activeGroupId===id) { activeGroupId=data.groups[0]?.id||null; activeTimerId=null; }
  saveData(); renderSidebar(); renderGroupContent(); updatePreview();
}

// ══════════════════════════════════════════════════════════════════
//  CONTENIDO DEL GRUPO
// ══════════════════════════════════════════════════════════════════
function renderGroupContent() {
  const el = document.getElementById('groupContent');
  if (!activeGroupId) {
    el.innerHTML = `<div class="no-groups"><strong>☰</strong>Abre el menú y crea un grupo para empezar.</div>`;
    return;
  }
  const g = getGroup(activeGroupId);
  if (!g) { el.innerHTML=''; return; }

  el.innerHTML = `
    <div class="group-bar">
      <div class="group-bar-name">
        <span class="group-bar-dot" style="background:${g.color}"></span>${g.name}
      </div>
      <div class="group-bar-actions">
        <span class="badge">${g.timers?.length||0}</span>
        <button class="icon-btn" title="Editar grupo" onclick="openNewGroupModal(${g.id})">✎</button>
        <button class="icon-btn del" title="Eliminar grupo" onclick="deleteGroup(${g.id})">✕</button>
      </div>
    </div>

    <div class="create-card" id="createCard" style="${appType==='stopwatch'?'display:none':''}">
      <h3>Nuevo temporizador</h3>
      <div class="input-row">
        <div class="field" style="flex:2;min-width:130px">
          <label>Nombre</label>
          <input type="text" id="inName" placeholder="Pomodoro, Discurso…">
        </div>
        <div class="field">
          <label>Horas</label>
          <input type="number" id="inHr"  min="0" max="23" value="0">
        </div>
        <div class="field">
          <label>Min</label>
          <input type="number" id="inMin" min="0" max="59" value="5">
        </div>
        <div class="field">
          <label>Seg</label>
          <input type="number" id="inSec" min="0" max="59" value="0">
        </div>
      </div>
      <button class="btn-add" onclick="addTimer()">+ Guardar temporizador</button>
    </div>

    <div class="saved-list" id="savedList"></div>
  `;
  renderTimerList();
}

// ══════════════════════════════════════════════════════════════════
//  LISTA + DRAG & DROP
// ══════════════════════════════════════════════════════════════════
function renderTimerList() {
  const el = document.getElementById('savedList');
  if (!el) return;
  const g = getGroup(activeGroupId);
  if (!g) return;

  if (!g.timers?.length) {
    el.innerHTML = `<div class="empty"><strong>⏱</strong>Sin temporizadores.<br>Crea uno arriba.</div>`;
    return;
  }

  el.innerHTML = g.timers.map(t => {
    if (editingTimerId === t.id) {
      const h = Math.floor(t.ms / 3600000);
      const m = Math.floor((t.ms % 3600000) / 60000);
      const s = Math.floor((t.ms % 60000) / 1000);
      return `
        <div class="t-card editing" data-id="${t.id}">
          <div class="t-dot" style="background:${g.color}"></div>
          <div class="t-edit-row">
            <input class="t-edit-input" id="editName_${t.id}" value="${t.name}" placeholder="Nombre">
            <input class="t-edit-num" id="editHr_${t.id}"  type="number" min="0" max="23" value="${h}" title="Horas">
            <span class="t-edit-sep">h</span>
            <input class="t-edit-num" id="editMin_${t.id}" type="number" min="0" max="59" value="${m}" title="Min">
            <span class="t-edit-sep">m</span>
            <input class="t-edit-num" id="editSec_${t.id}" type="number" min="0" max="59" value="${s}" title="Seg">
            <span class="t-edit-sep">s</span>
          </div>
          <div class="t-edit-actions">
            <button class="icon-btn save" onclick="saveEditTimer(${t.id})">✓</button>
            <button class="icon-btn"      onclick="cancelEdit()">✕</button>
          </div>
        </div>`;
    }
    return `
      <div class="t-card ${activeTimerId===t.id?'selected':''}"
           data-id="${t.id}"
           draggable="true"
           ondragstart="onDragStart(event,${t.id})"
           ondragover="onDragOver(event,${t.id})"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,${t.id})"
           ondragend="onDragEnd()"
           onclick="selectTimer(${g.id},${t.id})">
        <div class="drag-handle" title="Arrastrar para reordenar"
             onmousedown="event.stopPropagation()">⠿</div>
        <div class="t-dot" style="background:${g.color}"></div>
        <div class="t-info">
          <div class="t-name">${t.name}</div>
          <div class="t-dur">${fmtLabel(t.ms)}</div>
        </div>
        <div class="t-time">${fmtMs(t.ms)}</div>
        <div class="t-actions">
          <button class="icon-btn" title="Reproducir"
            onclick="event.stopPropagation();selectTimer(${g.id},${t.id});sendPlay()">▶</button>
          <button class="icon-btn" title="Editar"
            onclick="event.stopPropagation();startEdit(${t.id})">✎</button>
          <button class="icon-btn del" title="Eliminar"
            onclick="event.stopPropagation();deleteTimer(${g.id},${t.id})">✕</button>
        </div>
      </div>`;
  }).join('');
}

// ── Drag & Drop handlers ──
function onDragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}
function onDragOver(e, id) {
  if (id === dragSrcId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.t-card').forEach(c => c.classList.remove('drag-over'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, targetId) {
  e.preventDefault();
  if (dragSrcId === targetId) return;
  const g = getGroup(activeGroupId);
  if (!g) return;
  const srcIdx = g.timers.findIndex(t=>t.id===dragSrcId);
  const tgtIdx = g.timers.findIndex(t=>t.id===targetId);
  if (srcIdx<0||tgtIdx<0) return;
  const [moved] = g.timers.splice(srcIdx, 1);
  g.timers.splice(tgtIdx, 0, moved);
  saveData(); renderTimerList(); renderSidebar();
}
function onDragEnd() {
  dragSrcId = null;
  document.querySelectorAll('.t-card').forEach(c => {
    c.classList.remove('dragging'); c.classList.remove('drag-over');
  });
}

// ══════════════════════════════════════════════════════════════════
//  CRUD TIMERS
// ══════════════════════════════════════════════════════════════════
function addTimer() {
  if (!activeGroupId) return;
  const g    = getGroup(activeGroupId);
  const name = document.getElementById('inName').value.trim() || 'Timer';
  const hr   = parseInt(document.getElementById('inHr').value)  || 0;
  const min  = parseInt(document.getElementById('inMin').value)  || 0;
  const sec  = parseInt(document.getElementById('inSec').value)  || 0;
  const ms   = (hr*3600 + min*60 + sec) * 1000;
  if (ms<=0) { alert('El tiempo debe ser mayor a 0.'); return; }
  const entry = { id: Date.now(), name, ms };
  g.timers.unshift(entry);
  saveData();
  document.getElementById('inName').value = '';
  document.getElementById('inHr').value  = '0';
  document.getElementById('inMin').value = '5';
  document.getElementById('inSec').value = '0';
  selectTimer(activeGroupId, entry.id);
  renderTimerList(); renderSidebar();
}

function selectTimer(gid, tid) {
  activeGroupId=gid; activeTimerId=tid;
  updatePreview(); renderTimerList(); renderSidebar();
}

function startEdit(tid) {
  editingTimerId=tid; renderTimerList();
  setTimeout(()=>document.getElementById('editName_'+tid)?.focus(), 30);
}

function saveEditTimer(tid) {
  const g = getGroup(activeGroupId);
  const t = g?.timers.find(x=>x.id===tid);
  if (!t) return;
  const name = document.getElementById('editName_'+tid).value.trim() || t.name;
  const hr   = parseInt(document.getElementById('editHr_'+tid).value)  || 0;
  const min  = parseInt(document.getElementById('editMin_'+tid).value)  || 0;
  const sec  = parseInt(document.getElementById('editSec_'+tid).value)  || 0;
  const ms   = (hr*3600 + min*60 + sec) * 1000;
  if (ms<=0) { alert('El tiempo debe ser mayor a 0.'); return; }
  t.name=name; t.ms=ms;
  editingTimerId=null;
  saveData();
  if (activeTimerId===tid) updatePreview();
  renderTimerList(); renderSidebar();
}

function cancelEdit() { editingTimerId=null; renderTimerList(); }

function deleteTimer(gid, tid) {
  const g=getGroup(gid); if (!g) return;
  g.timers=g.timers.filter(t=>t.id!==tid);
  if (activeTimerId===tid) { activeTimerId=null; updatePreview(); }
  editingTimerId=null;
  saveData(); renderTimerList(); renderSidebar();
}

// ══════════════════════════════════════════════════════════════════
//  PREVIEW ESTÁTICO
// ══════════════════════════════════════════════════════════════════
function updatePreview() {
  if (appType==='stopwatch') {
    document.getElementById('previewTime').textContent = '00:00';
    document.getElementById('previewName').textContent = 'Cronómetro libre';
    document.getElementById('previewSub').textContent  = 'Contará hacia arriba desde cero';
    return;
  }
  if (!activeTimerId) {
    document.getElementById('previewTime').textContent = '--:--';
    document.getElementById('previewName').textContent = 'Sin selección';
    document.getElementById('previewSub').textContent  = 'Selecciona un temporizador';
    return;
  }
  const t=getTimer(activeGroupId,activeTimerId);
  if (!t) return;
  document.getElementById('previewTime').textContent = fmtMs(t.ms);
  document.getElementById('previewName').textContent = t.name;
  document.getElementById('previewSub').textContent  = fmtLabel(t.ms);
}

// ══════════════════════════════════════════════════════════════════
//  TOGGLE TIPO
// ══════════════════════════════════════════════════════════════════
function switchType(type) {
  appType=type;
  document.getElementById('ttTimer').classList.toggle('active',     type==='timer');
  document.getElementById('ttStopwatch').classList.toggle('active', type==='stopwatch');
  const cc=document.getElementById('createCard');
  if (cc) cc.style.display=type==='timer'?'':'none';
  updatePreview();
}

// ══════════════════════════════════════════════════════════════════
//  VENTANA REPRODUCTOR
// ══════════════════════════════════════════════════════════════════
function openPlayerWindow() {
  const url=new URL('player.html', location.href).href;
  playerWin=window.open(url,'timer_player','width=900,height=600,menubar=no,toolbar=no,location=no,status=no');
  setTimeout(updateWindowStatus, 500);
}

function broadcast(msg) { localStorage.setItem(CH, JSON.stringify({...msg, _t:Date.now()})); }

function updateWindowStatus() {
  const dot=document.getElementById('wsDot'), text=document.getElementById('wsText');
  const open=playerWin&&!playerWin.closed;
  if (!open) { dot.className='ws-dot'; text.textContent='Ventana del reproductor no abierta'; return; }
  const s=playerState.status;
  if (s==='playing')     { dot.className='ws-dot playing'; text.textContent='▶ Reproduciendo'; }
  else if (s==='paused') { dot.className='ws-dot on';      text.textContent='⏸ Pausado — ventana abierta'; }
  else                   { dot.className='ws-dot on';      text.textContent='Ventana del reproductor abierta y lista'; }
}
setInterval(updateWindowStatus, 1500);

function sendPlay() {
  if (!playerWin||playerWin.closed) { openPlayerWindow(); setTimeout(_doPlay,800); return; }
  _doPlay();
}
function _doPlay() {
  if (appType==='stopwatch') {
    broadcast({cmd:'play',mode:'stopwatch',name:'Cronómetro',totalMs:0});
  } else {
    if (!activeTimerId) { alert('Selecciona un temporizador primero.'); return; }
    const t=getTimer(activeGroupId,activeTimerId);
    if (!t) return;
    broadcast({cmd:'play',mode:'timer',name:t.name,totalMs:t.ms});
  }
  playerState.status='playing'; updateWindowStatus(); startMirror();
}
function sendPause() { broadcast({cmd:'pause'}); playerState.status='paused'; updateWindowStatus(); }
function sendReset() { broadcast({cmd:'reset'}); playerState.status='paused'; updateWindowStatus(); }
function sendStop()  { broadcast({cmd:'stop'});  playerState.status='idle';   updateWindowStatus(); stopMirror(); }

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
renderSidebar();
renderGroupContent();
updatePreview();
updateWindowStatus();

// Verificar si ya hay algo reproduciéndose (por si se recargas la página)
try {
  const st = JSON.parse(localStorage.getItem(CH_STATE)||'null');
  if (st && st.playerMode !== 'idle') startMirror();
} catch(e) {}

document.getElementById('modalGroupName').addEventListener('keydown', e=>{
  if (e.key==='Enter') saveGroup();
  if (e.key==='Escape') closeModal();
});
</script>
